openapi: 3.0.1
info:
  version: finances
  title: Документы и бухгалтерия
  description: |
    <div class="description_important">
        Узнать больше о документах и бухгалтерии можно в <a href="https://seller.wildberries.ru/instructions/category/ba929b64-1f89-4426-82d7-ce998ee552bd?goBackOption=prevRoute&categoryId=3c971375-9939-45e8-ab82-376019be8942">справочном центре</a>
    </div>

    Просмотр [баланса](/openapi/financial-reports-and-accounting#tag/Balans), [финансовых отчётов](/openapi/financial-reports-and-accounting#tag/Finansovye-otchyoty) и [документов](/openapi/financial-reports-and-accounting#tag/Dokumenty) продавца.
  x-file-name: finances
security:
  - HeaderApiKey: []
tags:
  - name: Баланс
    description: ''
  - name: Финансовые отчёты
    description: ''
  - name: Документы
    description: ''
paths:
  /api/v1/account/balance:
    servers:
      - url: https://finance-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: finance
      security:
        - HeaderApiKey: []
      summary: Получить баланс продавца
      description: |
        Метод возвращает данные виджета баланса на [главной странице](https://seller.wildberries.ru) портала продавцов.
        <br><br>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 мин | 1 запрос | 1 мин | 1 запрос |
        </div>
      tags:
        - Баланс
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  currency:
                    example: RUB
                    type: string
                    description: Валюта
                  current:
                    example: 10196.21
                    type: number
                    description: Текущий баланс продавца
                  for_withdraw:
                    example: 6395.8
                    type: number
                    description: Сумма, доступная к выводу
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v5/supplier/reportDetailByPeriod:
    servers:
      - url: https://statistics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: statistics
      security:
        - HeaderApiKey: []
      summary: Отчёт о продажах по реализации
      description: |
        Метод возвращает детализации к [отчётам реализации](https://seller.wildberries.ru/suppliers-mutual-settlements).
        <br><br>
        Данные доступны с 29 января 2024 года.

        <div class="description_important">
          Вы можете выгрузить данные в <a href="https://dev.wildberries.ru/ru/cases/1">Google Таблицы</a>
        </div>

        <div class="description_limit">
          <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

          | Период | Лимит | Интервал | Всплеск |
          | --- | --- | --- | --- |
          | 1 минута | 1 запрос | 1 минута | 1 запрос |
        </div>
      tags:
        - Финансовые отчёты
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          required: true
          description: |
            Начальная дата отчёта.<br>
            Дата в формате RFC3339. Можно передать дату или дату со временем.
            Время можно указывать с точностью до секунд или миллисекунд. <br>
            Время передаётся в часовом поясе Москва (UTC+3).
            <br>Примеры:
              - `2019-06-20`
              - `2019-06-20T23:59:59`
              - `2019-06-20T00:00:00.12345`
              - `2017-03-25T00:00:00`
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
          required: true
          description: Конечная дата отчёта
        - in: query
          name: limit
          schema:
            type: integer
            default: 100000
            maximum: 100000
          required: false
          description: Количество строк в ответе
        - in: query
          name: rrdid
          schema:
            type: integer
            default: 0
          required: false
          description: |
            Уникальный ID строки отчёта. Необходим для получения отчёта частями.
            <br>
            Загрузку отчёта нужно начинать с `rrdid = 0` и при последующих вызовах API передавать в запросе значение `rrd_id` из последней строки, полученной в результате предыдущего вызова.
            <br>
            Таким образом, для загрузки одного отчёта может понадобиться вызывать API до тех пор, пока не вернётся ответ 204.
        - in: query
          name: period
          schema:
            type: string
            enum:
              - weekly
              - daily
            default: weekly
          required: false
          description: |
            Периодичность отчёта:
              - `weekly` — еженедельный
              - `daily` — ежедневный
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DetailReportItem'
        '204':
          description: Нет данных
        '400':
          $ref: '#/components/responses/response400rDBP'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/documents/categories:
    servers:
      - url: https://documents-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: documents
      tags:
        - Документы
      security:
        - HeaderApiKey: []
      summary: Категории документов
      description: |
        Метод возвращает категории документов для получения [списка документов продавца](/openapi/financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1list/get).

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 10 сек | 1 запрос | 10 сек | 5 запросов |
        </div>
      parameters:
        - $ref: '#/components/parameters/LocaleCat'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCategories'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/documents/list:
    servers:
      - url: https://documents-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: documents
      security:
        - HeaderApiKey: []
      tags:
        - Документы
      summary: Список документов
      description: |
        Метод возвращает список документов продавца. Вы можете получить [один](/openapi/financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1download/get) или [несколько](/openapi/financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1download~1all/post) документов из полученного списка.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 10 сек | 1 запрос | 10 сек | 5 запросов |
        </div>
      parameters:
        - $ref: '#/components/parameters/LocaleList'
        - in: query
          name: beginTime
          schema:
            type: string
            format: date
            example: '2024-07-09'
          description: Начало периода. Только вместе с `endTime`
        - in: query
          name: endTime
          schema:
            type: string
            format: date
            example: '2024-07-15'
          description: Конец периода. Только вместе с `beginTime`
        - in: query
          name: sort
          schema:
            type: string
            enum:
              - date
              - category
            default: date
            example: category
          description: |
            Сортировка:
              - `date` — по дате создания документа
              - `category` — по категории (только при `locale=ru`)

            Только вместе с `order`
        - in: query
          name: order
          schema:
            type: string
            enum:
              - desc
              - asc
            default: desc
            example: asc
          description: |
            Сортировка:
              - `desc` — по убыванию
              - `asc` — по возрастанию

            Только вместе с `sort`
        - in: query
          name: category
          schema:
            type: string
            example: redeem-notification
          description: ID [категории документов](./financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1categories/get) из поля `name`
        - in: query
          name: serviceName
          schema:
            type: string
            example: redeem-notification-44841941
          description: Уникальный ID документа
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 50
            example: 10
          description: Максимальное количество строк ответа
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            example: 90
          description: После какой строки выдавать данные
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetList'
        '400':
          $ref: '#/components/responses/Responses400List'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/documents/download:
    servers:
      - url: https://documents-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: documents
      security:
        - HeaderApiKey: []
      tags:
        - Документы
      summary: Получить документ
      description: |
        Метод загружает один документ из [списка документов продавца](/openapi/financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1list/get).

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 10 сек | 1 запрос | 10 сек | 5 запросов |
        </div>
      parameters:
        - in: query
          required: true
          name: serviceName
          schema:
            type: string
            example: redeem-notification-44841941
          description: Уникальный ID документа
        - in: query
          required: true
          name: extension
          schema:
            type: string
            example: zip
          description: Формат документа
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDoc'
        '400':
          $ref: '#/components/responses/Responses400Download'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/documents/download/all:
    servers:
      - url: https://documents-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: documents
      security:
        - HeaderApiKey: []
      tags:
        - Документы
      summary: Получить документы
      description: |
        Метод загружает несколько документов из [списка документов продавца](/openapi/financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1list/get).

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 5 мин | 1 запрос | 5 мин | 5 запросов |
        </div>
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/requestDownload'
            example:
              params:
                - extension: zip
                  serviceName: redeem-notification-44841941
                - extension: xlsx
                  serviceName: act-income-mp-392460936
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocs'
        '400':
          $ref: '#/components/responses/Responses400DownloadAll'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
components:
  parameters:
    LocaleCat:
      name: locale
      in: query
      schema:
        type: string
        example: ru
        default: en
      description: |
        Язык поля `title`:
          - `ru` — русский
          - `en` — английский
          - `zh` — китайский
    LocaleList:
      name: locale
      in: query
      schema:
        type: string
        example: ru
        default: en
      description: |
        Язык поля `category`:
          - `ru` — русский
          - `en` — английский
          - `zh` — китайский
  schemas:
    requestDownload:
      type: object
      properties:
        params:
          type: array
          maxItems: 50
          minItems: 1
          items:
            type: object
            properties:
              extension:
                type: string
                description: Формат документа
              serviceName:
                type: string
                description: Уникальный ID документа
    GetCategories:
      properties:
        data:
          type: object
          properties:
            categories:
              description: Категории документов
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: redeem-notification
                    description: ID категории документа из параметра [запроса](./financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1list/get) `category`
                  title:
                    type: string
                    example: Уведомление о выкупе
                    description: Название категории документа из поля [ответа](./financial-reports-and-accounting#tag/Dokumenty/~1api~1v1~1documents~1list/get) `category`
    GetList:
      properties:
        data:
          type: object
          properties:
            documents:
              description: Категории документов
              type: array
              items:
                type: object
                properties:
                  serviceName:
                    type: string
                    example: redeem-notification-44841941
                    description: Уникальный ID документа
                  name:
                    type: string
                    example: redeem-notification
                    description: Название документа
                  category:
                    type: string
                    example: Уведомление о выкупе
                    description: Название [категории документов](./financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1categories/get) из поля ответа `title`
                  extensions:
                    type: array
                    items:
                      type: string
                      example: zip
                    description: Форматы документа
                  creationTime:
                    type: string
                    example: '2023-10-03T00:18:06.879Z'
                    description: Дата и время создания документа
                  viewed:
                    type: boolean
                    example: false
                    description: Выгружен ли документ в личном кабинете
    GetDoc:
      properties:
        data:
          type: object
          properties:
            fileName:
              type: string
              example: Notice of redemption 44841941.zip
              description: Название документа
            extension:
              type: string
              example: zip
              description: Формат документа
            document:
              type: string
              example: ...
              description: Документ в кодировке base64
    GetDocs:
      properties:
        data:
          type: object
          properties:
            fileName:
              type: string
              example: documents.zip
              description: Название документа
            extension:
              type: string
              example: zip
              description: Формат документа
            document:
              type: string
              example: ...
              description: Документ в кодировке base64
    DetailReportItem:
      type: object
      properties:
        realizationreport_id:
          example: 1234567
          type: integer
          description: Номер отчёта
        date_from:
          example: '2022-10-17'
          type: string
          format: date
          description: Дата начала отчётного периода
        date_to:
          example: '2022-10-23'
          type: string
          format: date
          description: Дата конца отчётного периода
        create_dt:
